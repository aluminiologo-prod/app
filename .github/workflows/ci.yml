name: CI - Mobile Quality Gate

on:
  pull_request:
    branches: [master, development]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Expo Doctor — SDK health check
  # ──────────────────────────────────────────────
  expo-doctor:
    name: Expo Doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run expo-doctor
        run: npx expo-doctor

  # ──────────────────────────────────────────────
  # 2. Lint + Type-check
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [expo-doctor]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint "app/**/*.{ts,tsx}" "src/**/*.{ts,tsx}" --ext .ts,.tsx --max-warnings 0

  # ──────────────────────────────────────────────
  # 3. Unit Tests (Jest)
  # ──────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [expo-doctor]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Jest
        run: yarn test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 4. EAS Build
  #    PR → master      : production profile
  #    PR → development : development profile
  # ──────────────────────────────────────────────
  eas-build-check:
    name: EAS Build (${{ github.base_ref == 'master' && 'production' || 'development' }} profile)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (no-wait)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_PROFILE: ${{ github.base_ref == 'master' && 'production' || 'development' }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "⚠️  EXPO_TOKEN secret is not configured — skipping EAS build."
            echo "    Go to Settings → Secrets and variables → Actions and add EXPO_TOKEN."
            exit 0
          fi
          echo "Building with profile: $EAS_PROFILE"
          eas build --platform all --profile "$EAS_PROFILE" --non-interactive --no-wait
